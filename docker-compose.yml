version: '3.8'

services:
  # api:
  #   build: .
  #   ports:
  #     - '3000:3000'
  #   environment:
  #     NODE_ENV: development
  #     DB_HOST: postgres
  #     DB_PORT: 5432
  #     DB_NAME: ecommerce_db
